version: "3.8"

services:
  vlm-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_ID=Qwen/Qwen2-VL-2B-Instruct
      - ADAPTER_PATH=/models/adapter
      - QUANTIZE_4BIT=true
      - TRANSFORMERS_CACHE=/cache/huggingface
    volumes:
      - model-cache:/cache/huggingface
      - ./adapters:/models/adapter
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  model-cache:
